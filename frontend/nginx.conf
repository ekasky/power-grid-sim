server {
  listen 80;
  listen [::]:80;

  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Forward API requests to Spring Boot Backend
  location /api/ {
    proxy_pass http://api:8080;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Asset locations
  location /assets/ {
    try_files $uri =404;

    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Don't cache index.html so new deploys are detected
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # React router fallback
  #
  # If a requested file does not exist, server index.html and let the React Router determine which page should be shown
  location / {
    try_files $uri $uri/ /index.html;
  }

}